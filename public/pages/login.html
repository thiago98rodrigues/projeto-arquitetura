<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — BusTrack</title>

  <!-- Font Awesome (ícones olho/ônibus) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <!-- Estilos -->
  <link rel="stylesheet" href="../styles/main.css">
  <link rel="stylesheet" href="../styles/login.css">
</head>
<body>

  <!-- ===================== ALERTA ===================== -->
  <div id="alert-message" role="alert" aria-live="polite">
    <span id="alert-text"></span>
  </div>

  <!-- ===================== LAYOUT ===================== -->
  <main class="login-layout">

    <!-- Coluna esquerda: imagem -->
    <div class="login-image" aria-hidden="true">
      <img src="../assets/onibus.jpg" alt="Ônibus verde AT Metro em rua de Auckland">
    </div>

    <!-- Coluna direita: formulário -->
    <section class="login-panel">

      <!-- Badge -->
      <div class="badge" aria-hidden="true">
        <i class="fa-solid fa-bus"></i>
      </div>

      <!-- Títulos -->
      <h1 class="login-title">Seja<br>bem-vindo de volta!</h1>
      <p class="login-subtitle">Cada jornada bem-sucedida começa com uma boa organização.</p>

      <!-- Formulário -->
      <form id="login-form" novalidate>

        <!-- Campo email / telefone -->
        <div class="field-wrapper">
          <label for="email" class="sr-only">Email ou número</label>
          <div class="input-group">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <path d="m22 6-10 7L2 6"/>
            </svg>
            <input
              type="text"
              id="email"
              name="email"
              placeholder="Seu Email ou número"
              autocomplete="username"
              inputmode="email"
            >
          </div>
        </div>

        <!-- Campo senha -->
        <div class="field-wrapper">
          <label for="senha" class="sr-only">Senha</label>
          <div class="input-group password-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="7.5" cy="15.5" r="5.5"/>
              <path d="m21 2-9.6 9.6"/>
              <path d="m15.5 7.5 3 3L22 7l-3-3"/>
            </svg>
            <input
              type="password"
              id="senha"
              name="senha"
              placeholder="Senha"
              autocomplete="current-password"
            >
            <button
              type="button"
              id="toggle-password"
              class="toggle-eye"
              aria-label="Mostrar ou ocultar senha"
            >
              <i class="fa-solid fa-eye" aria-hidden="true"></i>
            </button>
          </div>
        </div>

        <!-- Link esqueceu senha -->
        <a href="#" class="forgot-link">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round"
               width="16" height="16" aria-hidden="true">
            <path d="M5 12h14"/>
            <path d="m13 6 6 6-6 6"/>
          </svg>
          Esqueceu a senha?
        </a>

        <!-- Botão entrar -->
        <button type="submit" id="btn-submit" class="btn-entrar">
          <span class="btn-label">Entrar</span>
          <span class="spinner" aria-hidden="true"></span>
        </button>

      </form>

    </section>
  </main>

  <script src="../scripts/login.js"></script>

  <!-- Toggle senha inline (fallback caso login.js não carregue) -->
  <script>
    (function(){
      var btn = document.getElementById('toggle-password');
      var inp = document.getElementById('senha');
      if(!btn || !inp) return;
      btn.addEventListener('click', function(){
        var hidden = inp.type === 'password';
        inp.type = hidden ? 'text' : 'password';
        var icon = btn.querySelector('i');
        if(icon){
          icon.className = hidden ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye';
        }
        btn.setAttribute('aria-label', hidden ? 'Ocultar senha' : 'Mostrar senha');
      });
    })();
  </script>

</body>
</html>
